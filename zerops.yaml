zerops:
  - setup: prod
    build:
      base: nodejs@22
      buildCommands:
        - npm install
        - npm run build
        - mv node_modules node_modules_dev
        - npm install --omit=dev
      deployFiles:
        - ./dist
        - ./node_modules
        - ./package.json
        - ./views
      cache:
        - node_modules
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        DATABASE_HOST: ${db_hostname}
        DATABASE_PORT: ${db_port}
        DATABASE_NAME: ${db_dbName}
        DATABASE_USERNAME: ${db_user}
        DATABASE_PASSWORD: ${db_password}
        NODE_ENV: production
      initCommands:
        - zsc execOnce ${appVersionId} -- node -e "var ds=require('./dist/data-source').AppDataSource;ds.initialize().then(function(){return ds.runMigrations()}).then(function(){ds.destroy();process.exit(0)}).catch(function(e){console.error(e);process.exit(1)})"
      start: node dist/main

  - setup: dev
    build:
      base: nodejs@22
      buildCommands: []
      deployFiles: ./
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        DATABASE_HOST: ${db_hostname}
        DATABASE_PORT: ${db_port}
        DATABASE_NAME: ${db_dbName}
        DATABASE_USERNAME: ${db_user}
        DATABASE_PASSWORD: ${db_password}
        NODE_ENV: development
      initCommands:
        - npm install
      start: zsc noop
