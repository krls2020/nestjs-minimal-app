# yaml-language-server: $schema=https://api.app-prg1.zerops.io/api/rest/public/settings/zerops-yaml-json-schema.json

# TEST 1: extends:base pattern
# Shared config in base, prod and dev extend it.
zerops:
  - setup: base
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        DATABASE_HOST: ${db_hostname}
        DATABASE_PORT: ${db_port}
        DATABASE_NAME: ${db_dbName}
        DATABASE_USERNAME: ${db_user}
        DATABASE_PASSWORD: ${db_password}

  - setup: prod
    extends: base
    build:
      base: nodejs@22
      buildCommands:
        - npm install
        - npm run build
        - mv node_modules node_modules_dev
        - npm install --omit=dev
      deployFiles:
        - ./dist
        - ./node_modules
        - ./package.json
        - ./views
      cache:
        - node_modules
    deploy:
      readinessCheck:
        httpGet:
          port: 3000
          path: /api/health
    run:
      envVariables:
        NODE_ENV: production
      initCommands:
        - zsc execOnce ${appVersionId} -- node -e "var ds=require('./dist/data-source').AppDataSource;ds.initialize().then(function(){return ds.runMigrations()}).then(function(){ds.destroy();process.exit(0)}).catch(function(e){console.error(e);process.exit(1)})"
      start: node dist/main
      healthCheck:
        httpGet:
          port: 3000
          path: /api/health

  - setup: dev
    extends: base
    build:
      base: nodejs@22
      buildCommands: []
      deployFiles: ./
      cache:
        - node_modules
    run:
      envVariables:
        NODE_ENV: development
      initCommands:
        - zsc scale ram +0.5GB 10m
        - npm install
      start: zsc noop
